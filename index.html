<!doctype html>
<html lang="ru-RU" data-version="!!!">
    <head>
        <title>Тест PWA</title>
        <link rel="icon" href="favicon.ico" type="image/x-icon" />
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <!--width=device-width — ширина страницы равна ширине экрана.-->
        <!--initial-scale=1.0 — начальный масштаб 100%.-->
        <!--maximum-scale=1.0 — запрещает увеличение (масштаб не больше 100%).-->
        <!--user-scalable=no — запрещает пользователю масштабировать страницу жестами.-->
        <meta name="theme-color" content="#000000" />
        <!--цвет статус-бара — панели уровня заряда, сети и времени + подвал.-->

        <!-- Мета для PWA (минимально) -->
        <link rel="manifest" href="manifest.json" />

        <script>
            const now = new Date();
            const VERSION = now.getHours() + "" + now.getMinutes() || document.documentElement.dataset.version;
            document.addEventListener("DOMContentLoaded", function () {
                document.body.insertAdjacentHTML("afterbegin", `<img src="icon192.png" alt="ТЕСТ" />`);
                document.body.insertAdjacentHTML("afterbegin", `<h1 id="myDiv">${VERSION}</h1>`);
            });
            navigator.serviceWorker.addEventListener("message", (event) => {
                document.getElementById("myDiv").textContent  = event.data.text;
            });
            
             if ("serviceWorker" in navigator) {
                navigator.serviceWorker
                    .register("sw.js")
                    .then(() => alert("pwa start"))
                    .catch(() => alert("pwa error"));
            }
        </script>
    </head>
    <body>
        <script>
           
        </script>
    </body>
</html>
